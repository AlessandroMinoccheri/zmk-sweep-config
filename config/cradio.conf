# ─── Ferris Sweep (Aurora) — ZMK board config ───────────────────────────────

# Enable mouse-key support (needed for mouse movement & click bindings in Layer 1)
CONFIG_ZMK_MOUSE=y

# Optional: increase USB polling rate for lower latency (wired only)
# CONFIG_USB_HID_POLL_INTERVAL_MS=1

# Optional: Bluetooth tweaks (useful if using nice!nano)
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
